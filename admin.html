<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Laundry FAQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .admin-container {
            display: grid;
            grid-template-columns: 1fr;
            min-height: 100vh;
        }

        .admin-content {
            padding: var(--spacing-2xl);
        }

        .admin-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-2xl);
            padding-bottom: var(--spacing-lg);
            border-bottom: 2px solid var(--border);
        }

        .admin-title {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--foreground);
        }

        .admin-actions {
            display: flex;
            gap: var(--spacing-md);
            align-items: center;
        }

        .admin-user-info {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            padding-right: var(--spacing-lg);
            border-right: 1px solid var(--border);
        }

        .admin-user-name {
            font-weight: 500;
            font-size: 0.875rem;
        }

        .admin-form-section {
            background-color: linear-gradient(135deg, rgba(217, 119, 6, 0.05) 0%, rgba(107, 142, 111, 0.05) 100%);
            border-left: 4px solid var(--primary);
            padding: var(--spacing-lg);
            border-radius: var(--radius-lg);
            margin-bottom: var(--spacing-2xl);
            display: none;
        }

        .admin-form-section.active {
            display: block;
        }

        .admin-form-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: var(--spacing-lg);
        }

        .admin-form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: var(--spacing-md);
        }

        @media (min-width: 768px) {
            .admin-form-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .admin-form-full {
            grid-column: 1 / -1;
        }

        .admin-form-buttons {
            display: flex;
            gap: var(--spacing-md);
            margin-top: var(--spacing-lg);
            grid-column: 1 / -1;
        }

        .admin-toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-lg);
            align-items: center;
        }

        .admin-search {
            flex: 1;
            min-width: 200px;
        }

        .admin-filters {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-lg);
        }

        .admin-list {
            display: grid;
            gap: var(--spacing-md);
        }

        .admin-item {
            background-color: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: var(--spacing-md);
        }

        .admin-item-content {
            flex: 1;
        }

        .admin-item-title {
            font-family: var(--font-accent);
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: var(--spacing-sm);
            color: var(--foreground);
        }

        .admin-item-meta {
            font-size: 0.875rem;
            color: var(--muted);
            margin-bottom: var(--spacing-sm);
        }

        .admin-item-tags {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
        }

        .admin-item-actions {
            display: flex;
            gap: var(--spacing-sm);
            flex-shrink: 0;
        }

        .admin-item-actions .btn {
            padding: var(--spacing-xs) var(--spacing-md);
            font-size: 0.75rem;
        }

        .tag-input-group {
            display: flex;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        .tag-input-group input {
            flex: 1;
        }

        .tag-list {
            display: flex;
            flex-wrap: wrap;
            gap: var(--spacing-sm);
            margin-bottom: var(--spacing-md);
        }

        .tag-item {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            padding: var(--spacing-xs) var(--spacing-md);
            background-color: rgba(107, 142, 111, 0.1);
            color: var(--secondary);
            border-radius: 9999px;
            font-size: 0.875rem;
        }

        .tag-item button {
            background: none;
            border: none;
            color: inherit;
            cursor: pointer;
            font-size: 1rem;
            padding: 0;
        }

        .empty-state {
            text-align: center;
            padding: var(--spacing-2xl);
            color: var(--muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: var(--spacing-md);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-2xl);
        }

        .stat-card {
            background-color: white;
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--spacing-lg);
            text-align: center;
        }

        .stat-value {
            font-family: var(--font-display);
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--muted);
            margin-top: var(--spacing-sm);
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header sticky">
        <div class="container">
            <div class="header-content">
                <div class="logo-section">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23D97706' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='60' font-size='40' font-weight='bold' fill='white' text-anchor='middle'%3ELF%3C/text%3E%3C/svg%3E" alt="Logo" class="logo">
                    <div>
                        <h1 class="logo-title">Admin Panel</h1>
                        <p class="logo-subtitle">Kelola FAQ Laundry</p>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="admin-user-info">
                        <span class="admin-user-name" id="userName">Admin</span>
                    </div>
                    <button class="btn btn-outline btn-small" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="admin-content">
        <div class="container">
            <div class="admin-header">
                <h2 class="admin-title">Manajemen FAQ</h2>
                <div class="admin-actions">
                    <button class="btn btn-primary" onclick="toggleCreateForm()">➕ Buat FAQ Baru</button>
                </div>
            </div>

            <!-- Alert Container -->
            <div id="alertContainer"></div>

            <!-- Statistics -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-value" id="totalFaqCount">0</div>
                    <div class="stat-label">Total FAQ</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="categoryCount">0</div>
                    <div class="stat-label">Kategori</div>
                </div>
            </div>

            <!-- Create/Edit Form -->
            <div class="admin-form-section" id="createFormSection">
                <h3 class="admin-form-title" id="formTitle">Buat FAQ Baru</h3>
                <form class="admin-form-grid" onsubmit="handleSaveFaq(event)">
                    <div class="form-group">
                        <label class="form-label" for="faqQuestion">Pertanyaan *</label>
                        <input type="text" id="faqQuestion" class="form-input" placeholder="Masukkan pertanyaan..." required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="faqCategory">Kategori *</label>
                        <select id="faqCategory" class="form-select" required>
                            <option value="">Pilih kategori...</option>
                        </select>
                    </div>

                    <div class="form-group admin-form-full">
                        <label class="form-label" for="faqAnswer">Jawaban *</label>
                        <textarea id="faqAnswer" class="form-textarea" placeholder="Masukkan jawaban..." required></textarea>
                    </div>

                    <div class="form-group admin-form-full">
                        <label class="form-label">Tag</label>
                        <div class="tag-input-group">
                            <input type="text" id="tagInput" class="form-input" placeholder="Tambahkan tag...">
                            <button type="button" class="btn btn-outline" onclick="addTag()">Tambah</button>
                        </div>
                        <div class="tag-list" id="tagList"></div>
                    </div>

                    <div class="admin-form-buttons">
                        <button type="submit" class="btn btn-primary" id="submitBtn">Buat FAQ</button>
                        <button type="button" class="btn btn-outline" onclick="cancelForm()">Batal</button>
                    </div>
                </form>
            </div>

            <!-- Search & Filter -->
            <div class="admin-toolbar">
                <div class="admin-search">
                    <input type="text" id="searchFaq" class="form-input" placeholder="Cari FAQ...">
                </div>
            </div>

            <div class="admin-filters">
                <button class="filter-btn active" data-category="all" onclick="filterAdminCategory('all')">Semua</button>
                <button class="filter-btn" data-category="general" onclick="filterAdminCategory('general')">Umum</button>
                <button class="filter-btn" data-category="stains" onclick="filterAdminCategory('stains')">Menghilangkan Noda</button>
                <button class="filter-btn" data-category="symbols" onclick="filterAdminCategory('symbols')">Simbol Laundry</button>
                <button class="filter-btn" data-category="care" onclick="filterAdminCategory('care')">Perawatan Pakaian</button>
                <button class="filter-btn" data-category="eco" onclick="filterAdminCategory('eco')">Ramah Lingkungan</button>
            </div>

            <!-- FAQ List -->
            <div class="admin-list" id="adminFaqList"></div>
        </div>
    </main>

    <script src="data.js"></script>
    <script src="admin.js"></script>
</body>
</html>
