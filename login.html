<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Laundry FAQ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(217, 119, 6, 0.1) 0%, rgba(107, 142, 111, 0.1) 100%);
            padding: var(--spacing-md);
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background-color: white;
            border-radius: var(--radius-lg);
            padding: var(--spacing-2xl);
            box-shadow: var(--shadow-lg);
        }

        .login-header {
            text-align: center;
            margin-bottom: var(--spacing-2xl);
        }

        .login-logo {
            width: 50px;
            height: 50px;
            margin: 0 auto var(--spacing-md);
        }

        .login-title {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--foreground);
            margin-bottom: var(--spacing-md);
        }

        .login-subtitle {
            color: var(--muted);
            font-size: 0.875rem;
        }

        .login-form {
            margin-bottom: var(--spacing-lg);
        }

        .form-divider {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin: var(--spacing-lg) 0;
        }

        .form-divider::before,
        .form-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: var(--border);
        }

        .form-divider-text {
            color: var(--muted);
            font-size: 0.875rem;
        }

        .login-footer {
            text-align: center;
            margin-top: var(--spacing-lg);
            color: var(--muted);
            font-size: 0.875rem;
        }

        .login-footer a {
            color: var(--primary);
            font-weight: 500;
        }

        .alert {
            margin-bottom: var(--spacing-lg);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--spacing-md);
            font-size: 0.875rem;
        }

        .checkbox-group input[type="checkbox"] {
            margin-right: var(--spacing-sm);
        }

        .checkbox-group a {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23D97706' width='100' height='100' rx='20'/%3E%3Ctext x='50' y='60' font-size='40' font-weight='bold' fill='white' text-anchor='middle'%3ELF%3C/text%3E%3C/svg%3E" alt="Logo" class="login-logo">
                <h1 class="login-title">Laundry FAQ</h1>
                <p class="login-subtitle">Masuk ke Akun Anda</p>
            </div>

            <div id="alertContainer"></div>

            <form class="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label class="form-label" for="email">Email atau Username</label>
                    <input type="text" id="email" class="form-input" placeholder="nama@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="checkbox-group">
                    <label>
                        <input type="checkbox" id="remember"> Ingat saya
                    </label>
                    <a href="#">Lupa password?</a>
                </div>

                <button type="submit" class="btn btn-primary btn-large" style="width: 100%;">Masuk</button>
            </form>

            <div class="form-divider">
                <span class="form-divider-text">atau</span>
            </div>

            <button type="button" class="btn btn-outline" style="width: 100%; margin-bottom: var(--spacing-lg);" onclick="loginAsDemo()">
                Masuk sebagai Demo
            </button>

            <div class="login-footer">
                Belum punya akun? <a href="#">Daftar di sini</a>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        // Demo credentials
        const demoUsers = [
            { email: 'admin@laundry.com', password: 'admin123', name: 'Admin User', role: 'admin' },
            { email: 'user@laundry.com', password: 'user123', name: 'Regular User', role: 'user' }
        ];

        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const alertContainer = document.getElementById('alertContainer');
            
            // Validation
            if (!email || !password) {
                showAlert('Email dan password harus diisi', 'error');
                return;
            }

            if (!email.includes('@') && email.length < 3) {
                showAlert('Format email atau username tidak valid', 'error');
                return;
            }

            // Check demo credentials
            const user = demoUsers.find(u => 
                (u.email === email || u.name.toLowerCase() === email.toLowerCase()) && 
                u.password === password
            );

            if (user) {
                // Login successful
                const userData = {
                    email: user.email,
                    name: user.name,
                    role: user.role
                };
                localStorage.setItem('currentUser', JSON.stringify(userData));
                showAlert('Login berhasil! Mengarahkan...', 'success');
                setTimeout(() => {
                    window.location.href = user.role === 'admin' ? 'admin.html' : 'index.html';
                }, 1000);
            } else {
                showAlert('Email/username atau password salah', 'error');
            }
        }

        function loginAsDemo() {
            document.getElementById('email').value = 'admin@laundry.com';
            document.getElementById('password').value = 'admin123';
            showAlert('Demo credentials sudah diisi. Klik Masuk untuk login.', 'info');
        }

        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            const icons = {
                success: '✓',
                error: '✕',
                info: 'ℹ',
                warning: '⚠'
            };
            
            alertContainer.innerHTML = `
                <div class="alert alert-${type}">
                    <span class="alert-icon">${icons[type]}</span>
                    <span>${message}</span>
                </div>
            `;
            
            if (type === 'success') {
                setTimeout(() => {
                    alertContainer.innerHTML = '';
                }, 3000);
            }
        }

        // Check if already logged in
        window.addEventListener('load', function() {
            const user = localStorage.getItem('currentUser');
            if (user) {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
